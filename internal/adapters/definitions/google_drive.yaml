service:
  id: google.drive
  display_name: Google Drive
  description: "List, search, and read files stored in Google Drive. Access documents, spreadsheets, and shared folders."
  setup_url: "https://github.com/clawvisor/clawvisor/blob/main/docs/GOOGLE_OAUTH_SETUP.md"
  icon_url: "/logos/google-drive.svg"
  identity:
    endpoint: "https://www.googleapis.com/oauth2/v2/userinfo"
    field: email

auth:
  type: oauth2
  oauth:
    scopes:
      - "https://www.googleapis.com/auth/drive.readonly"
      - "https://www.googleapis.com/auth/drive.file"
      - "https://www.googleapis.com/auth/userinfo.email"
    endpoint: google
    vault_key: google
    scope_merge: true

api:
  base_url: "https://www.googleapis.com/drive/v3"
  type: rest

actions:
  list_files:
    display_name: "List files"
    risk: { category: read, sensitivity: low, description: "List files in Google Drive" }
    scopes: ["https://www.googleapis.com/auth/drive.readonly"]
    method: GET
    path: "/files"
    params:
      query: { type: string, map_to: q, location: query }
      max_results: { type: int, default: 10, max: 50, map_to: pageSize, location: query }
      page_token: { type: string, map_to: pageToken, location: query }
      fields_param:
        type: string
        default: "nextPageToken,files(id,name,mimeType,modifiedTime,size,webViewLink)"
        map_to: fields
        location: query
    response:
      data_path: "files"
      fields:
        - { name: id }
        - { name: name, sanitize: true }
        - { name: mimeType }
        - { name: modifiedTime }
        - { name: size }
        - { name: webViewLink }
      meta:
        - { name: nextPageToken, rename: next_page_token }
      summary: "{{len .Data}} file(s)"

  get_file:
    display_name: "Get file"
    risk: { category: read, sensitivity: low, description: "Read a specific file from Google Drive" }
    scopes: ["https://www.googleapis.com/auth/drive.readonly"]
    override: go
    params:
      file_id: { type: string, required: true }

  download_file:
    display_name: "Download file"
    risk: { category: read, sensitivity: low, description: "Download a non-Google-Workspace file (PDFs, images, etc.) as base64-encoded content" }
    scopes: ["https://www.googleapis.com/auth/drive.readonly"]
    override: go
    params:
      file_id: { type: string, required: true }

  create_file:
    display_name: "Create file"
    risk: { category: write, sensitivity: medium, description: "Create a file in Google Drive" }
    scopes: ["https://www.googleapis.com/auth/drive.file"]
    override: go
    params:
      name: { type: string, required: true }
      content: { type: string, required: true }
      mime_type: { type: string }
      parent_folder_id: { type: string }

  update_file:
    display_name: "Update file"
    risk: { category: write, sensitivity: medium, description: "Update a file in Google Drive" }
    scopes: ["https://www.googleapis.com/auth/drive.file"]
    override: go
    params:
      file_id: { type: string, required: true }
      content: { type: string, required: true }

  export_file:
    display_name: "Export file"
    risk: { category: read, sensitivity: low, description: "Export a Google Workspace file (Docs, Sheets, Slides) to a downloadable format" }
    scopes: ["https://www.googleapis.com/auth/drive.readonly"]
    override: go
    params:
      file_id: { type: string, required: true }
      mime_type:
        type: string
        required: true
        description: "Target MIME type (e.g. application/pdf, text/plain, text/csv, application/vnd.openxmlformats-officedocument.wordprocessingml.document)"

  search_files:
    display_name: "Search files"
    risk: { category: search, sensitivity: low, description: "Search files in Google Drive" }
    scopes: ["https://www.googleapis.com/auth/drive.readonly"]
    method: GET
    path: "/files"
    params:
      query:
        type: string
        required: true
        location: query
        transform: "'fullText contains \\'' + replace(query, \"'\", \"\\\\'\") + '\\''"
        map_to: q
      max_results: { type: int, default: 10, max: 50, map_to: pageSize, location: query }
      page_token: { type: string, map_to: pageToken, location: query }
      fields_param:
        type: string
        default: "nextPageToken,files(id,name,mimeType,modifiedTime,size,webViewLink)"
        map_to: fields
        location: query
    response:
      data_path: "files"
      fields:
        - { name: id }
        - { name: name, sanitize: true }
        - { name: mimeType }
        - { name: modifiedTime }
        - { name: size }
        - { name: webViewLink }
      meta:
        - { name: nextPageToken, rename: next_page_token }
      summary: "{{len .Data}} file(s)"
