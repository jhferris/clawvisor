service:
  id: twilio
  display_name: Twilio
  description: "Send and receive SMS and WhatsApp messages, check delivery status, and manage conversations via Twilio."
  setup_url: "https://console.twilio.com"
  icon_svg: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 0C5.381-.008.008 5.352 0 11.971V12c0 6.64 5.359 12 12 12 6.64 0 12-5.36 12-12 0-6.641-5.36-12-12-12zm0 20.801c-4.846.015-8.786-3.904-8.801-8.75V12c-.014-4.846 3.904-8.786 8.75-8.801H12c4.847-.014 8.786 3.904 8.801 8.75V12c.015 4.847-3.904 8.786-8.75 8.801H12zm5.44-11.76c0 1.359-1.12 2.479-2.481 2.479-1.366-.007-2.472-1.113-2.479-2.479 0-1.361 1.12-2.481 2.479-2.481 1.361 0 2.481 1.12 2.481 2.481zm0 5.919c0 1.36-1.12 2.48-2.481 2.48-1.367-.008-2.473-1.114-2.479-2.48 0-1.359 1.12-2.479 2.479-2.479 1.361-.001 2.481 1.12 2.481 2.479zm-5.919 0c0 1.36-1.12 2.48-2.479 2.48-1.368-.007-2.475-1.113-2.481-2.48 0-1.359 1.12-2.479 2.481-2.479 1.358-.001 2.479 1.12 2.479 2.479zm0-5.919c0 1.359-1.12 2.479-2.479 2.479-1.367-.007-2.475-1.112-2.481-2.479 0-1.361 1.12-2.481 2.481-2.481 1.358 0 2.479 1.12 2.479 2.481z" fill="#F22F46"/></svg>'

auth:
  type: basic

api:
  base_url: "https://api.twilio.com/2010-04-01/Accounts/{{.credential.sid}}"
  type: rest

actions:
  send_sms:
    display_name: "Send SMS"
    risk: { category: write, sensitivity: high, description: "Send an SMS message (costs money)" }
    method: POST
    path: "/Messages.json"
    encoding: form
    params:
      to: { type: string, required: true, location: body }
      body: { type: string, required: true, location: body }
      from: { type: string, location: body }
    response:
      fields:
        - { name: sid }
        - { name: status }
        - { name: to }
        - { name: from }
      summary: "SMS sent to {{.to}} (status: {{.status}})"

  send_whatsapp:
    display_name: "Send WhatsApp"
    risk: { category: write, sensitivity: high, description: "Send a WhatsApp message (costs money)" }
    method: POST
    path: "/Messages.json"
    encoding: form
    params:
      to: { type: string, required: true, location: body }
      body: { type: string, required: true, location: body }
      from: { type: string, location: body }
    response:
      fields:
        - { name: sid }
        - { name: status }
        - { name: to }
        - { name: from }
      summary: "WhatsApp message sent to {{.to}} (status: {{.status}})"

  list_messages:
    display_name: "List messages"
    risk: { category: read, sensitivity: low, description: "List Twilio messages" }
    method: GET
    path: "/Messages.json"
    params:
      page_size: { type: int, default: 20, max: 1000, location: query }
      to: { type: string, location: query }
      from: { type: string, location: query }
    response:
      data_path: "messages"
      fields:
        - { name: sid }
        - { name: to }
        - { name: from }
        - { name: body, sanitize: true }
        - { name: status }
        - { name: direction }
        - { name: date_sent }
      summary: "{{len .Data}} message(s)"

  get_message:
    display_name: "Get message"
    risk: { category: read, sensitivity: low, description: "Read a specific Twilio message" }
    method: GET
    path: "/Messages/{{.sid}}.json"
    params:
      sid: { type: string, required: true, location: path }
    response:
      fields:
        - { name: sid }
        - { name: to }
        - { name: from }
        - { name: body, sanitize: true }
        - { name: status }
        - { name: direction }
        - { name: date_sent }
        - { name: price }
        - { name: price_unit }
      summary: "Message {{.sid}}: {{.from}} → {{.to}} [{{.status}}]"
