service:
  id: google.calendar
  display_name: Google Calendar
  description: "View, create, and update calendar events. Check availability, manage invites, and organize your schedule."
  setup_url: "https://github.com/clawvisor/clawvisor/blob/main/docs/GOOGLE_OAUTH_SETUP.md"
  icon_url: "/logos/google-calendar.svg"
  identity:
    endpoint: "https://www.googleapis.com/oauth2/v2/userinfo"
    field: email

auth:
  type: oauth2
  oauth:
    scopes:
      - "https://www.googleapis.com/auth/calendar.readonly"
      - "https://www.googleapis.com/auth/calendar.events"
      - "https://www.googleapis.com/auth/userinfo.email"
    endpoint: google
    vault_key: google
    scope_merge: true

verification_hints: >
  Google Calendar accounts may have subscribed or overlay calendars belonging to
  other email addresses (e.g. a personal Gmail calendar visible on a work account).
  The list_calendars action returns all calendars accessible to the authenticated
  account, including these subscribed calendars. When the agent passes a calendar_id
  that differs from the authenticated account's email, this is NOT an account mismatch
  or scope violation — it is targeting a subscribed calendar that the account has been
  explicitly granted access to. Treat any calendar_id that could plausibly be a
  subscribed calendar as within scope.

api:
  base_url: "https://www.googleapis.com/calendar/v3"
  type: rest

actions:
  list_events:
    display_name: "List events"
    risk: { category: read, sensitivity: low, description: "List calendar events" }
    scopes: ["https://www.googleapis.com/auth/calendar.readonly"]
    method: GET
    path: "/calendars/{{.calendar_id}}/events"
    params:
      calendar_id: { type: string, default: "primary", location: path }
      from:
        type: string
        default_expr: "now()"
        transform: "rfc3339(from)"
        map_to: timeMin
        location: query
      to:
        type: string
        transform: "endOfDay(to)"
        map_to: timeMax
        location: query
      max_results: { type: int, default: 10, max: 50, map_to: maxResults, location: query }
      page_token: { type: string, map_to: pageToken, location: query }
      single_events: { type: string, default: "true", map_to: singleEvents, location: query }
      order_by: { type: string, default: "startTime", map_to: orderBy, location: query }
    response:
      data_path: "items"
      fields:
        - { name: id }
        - { name: summary, sanitize: true }
        - name: start
          expr: "start.dateTime ?? start.date ?? ''"
        - name: end
          expr: "end.dateTime ?? end.date ?? ''"
        - { name: location, sanitize: true, optional: true }
        - { name: description, sanitize: true, optional: true }
        - name: attendees
          expr: "attendees"
          optional: true
        - { name: status }
      meta:
        - { name: nextPageToken, rename: next_page_token }
      summary: "{{len .Data}} event(s)"

  get_event:
    display_name: "Get event"
    risk: { category: read, sensitivity: low, description: "Read a specific calendar event" }
    scopes: ["https://www.googleapis.com/auth/calendar.readonly"]
    method: GET
    path: "/calendars/{{.calendar_id}}/events/{{.event_id}}"
    params:
      event_id: { type: string, required: true, location: path }
      calendar_id: { type: string, default: "primary", location: path }
    response:
      fields:
        - { name: id }
        - { name: summary, sanitize: true }
        - name: start
          expr: "start.dateTime ?? start.date ?? ''"
        - name: end
          expr: "end.dateTime ?? end.date ?? ''"
        - { name: location, sanitize: true }
        - { name: description, sanitize: true }
        - { name: attendees }
        - name: transparency
          expr: "transparency ?? 'opaque'"
        - name: visibility
          expr: "visibility ?? 'default'"
        - { name: status }
      summary: "Event: {{.summary}}"

  create_event:
    display_name: "Create event"
    risk: { category: write, sensitivity: medium, description: "Create a calendar event" }
    scopes: ["https://www.googleapis.com/auth/calendar.events"]
    method: POST
    path: "/calendars/{{.calendar_id}}/events"
    params:
      calendar_id: { type: string, default: "primary", location: path }
      send_updates: { type: string, default: "none", location: query, map_to: sendUpdates }
      summary: { type: string, required: true, location: body }
      description: { type: string, location: body }
      start:
        type: string
        required: true
        location: body
        transform: "isAllDay(start) ? {date: start} : {dateTime: rfc3339(start)}"
      end:
        type: string
        required: true
        location: body
        transform: "isAllDay(end) ? {date: end} : {dateTime: rfc3339(end)}"
      attendees:
        type: array
        location: body
        transform: "emailList(attendees)"
      transparency:
        type: string
        location: body
        description: "Whether the event blocks time on the calendar. 'opaque' (default/busy) or 'transparent' (free)."
      visibility:
        type: string
        location: body
        description: "Visibility of the event. 'default', 'public', 'private', or 'confidential'."
    response:
      fields:
        - { name: id, rename: event_id }
        - { name: summary }
        - { name: htmlLink, rename: link }
      summary: "Created event: {{.summary}}"

  update_event:
    display_name: "Update event"
    risk: { category: write, sensitivity: medium, description: "Update a calendar event" }
    scopes: ["https://www.googleapis.com/auth/calendar.events"]
    method: PATCH
    path: "/calendars/{{.calendar_id}}/events/{{.event_id}}"
    body_mode: sparse
    params:
      event_id: { type: string, required: true, location: path }
      calendar_id: { type: string, default: "primary", location: path }
      send_updates: { type: string, default: "none", location: query, map_to: sendUpdates }
      summary: { type: string, location: body }
      description: { type: string, location: body }
      start:
        type: string
        location: body
        transform: "isAllDay(start) ? {date: start} : {dateTime: rfc3339(start)}"
      end:
        type: string
        location: body
        transform: "isAllDay(end) ? {date: end} : {dateTime: rfc3339(end)}"
      attendees:
        type: array
        location: body
        transform: "emailList(attendees)"
      transparency:
        type: string
        location: body
        description: "Whether the event blocks time on the calendar. 'opaque' (default/busy) or 'transparent' (free)."
      visibility:
        type: string
        location: body
        description: "Visibility of the event. 'default', 'public', 'private', or 'confidential'."
    response:
      fields:
        - { name: id, rename: event_id }
        - { name: summary }
      summary: "Updated event: {{.summary}}"

  delete_event:
    display_name: "Delete event"
    risk: { category: delete, sensitivity: high, description: "Delete a calendar event" }
    scopes: ["https://www.googleapis.com/auth/calendar.events"]
    method: DELETE
    path: "/calendars/{{.calendar_id}}/events/{{.event_id}}"
    params:
      event_id: { type: string, required: true, location: path }
      calendar_id: { type: string, default: "primary", location: path }
    response:
      summary: "Deleted event {{.event_id}}"

  list_calendars:
    display_name: "List calendars"
    risk: { category: read, sensitivity: low, description: "List available calendars" }
    scopes: ["https://www.googleapis.com/auth/calendar.readonly"]
    method: GET
    path: "/users/me/calendarList"
    params:
      max_results: { type: int, default: 50, max: 250, map_to: maxResults, location: query }
      page_token: { type: string, map_to: pageToken, location: query }
    response:
      data_path: "items"
      fields:
        - { name: id }
        - { name: summary }
        - { name: primary }
      meta:
        - { name: nextPageToken, rename: next_page_token }
      summary: "{{len .Data}} calendar(s)"
