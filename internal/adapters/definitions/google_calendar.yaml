service:
  id: google.calendar
  display_name: Google Calendar
  description: "View, create, and update calendar events. Check availability, manage invites, and organize your schedule."
  setup_url: "https://github.com/clawvisor/clawvisor/blob/main/docs/GOOGLE_OAUTH_SETUP.md"
  icon_svg: '<svg viewBox="0 0 24 24" fill="none"><path d="M18.316 5.684H24v12.632h-5.684V5.684zM5.684 24h12.632v-5.684H5.684V24zM18.316 5.684V0H1.895A1.894 1.894 0 0 0 0 1.895v16.421h5.684V5.684h12.632zm-7.207 6.25v-.065c.272-.144.5-.349.687-.617s.279-.595.279-.982c0-.379-.099-.72-.3-1.025a2.05 2.05 0 0 0-.832-.714 2.703 2.703 0 0 0-1.197-.257c-.6 0-1.094.156-1.481.467-.386.311-.65.671-.793 1.078l1.085.452c.086-.249.224-.461.413-.633.189-.172.445-.257.767-.257.33 0 .602.088.816.264a.86.86 0 0 1 .322.703c0 .33-.12.589-.36.778-.24.19-.535.284-.886.284h-.567v1.085h.633c.407 0 .748.109 1.02.327.272.218.407.499.407.843 0 .336-.129.614-.387.832s-.565.327-.924.327c-.351 0-.651-.103-.897-.311-.248-.208-.422-.502-.521-.881l-1.096.452c.178.616.505 1.082.977 1.401.472.319.984.478 1.538.477a2.84 2.84 0 0 0 1.293-.291c.382-.193.684-.458.902-.794.218-.336.327-.72.327-1.149 0-.429-.115-.797-.344-1.105a2.067 2.067 0 0 0-.881-.689zm2.093-1.931l.602.913L15 10.045v5.744h1.187V8.446h-.827l-2.158 1.557zM22.105 0h-3.289v5.184H24V1.895A1.894 1.894 0 0 0 22.105 0zm-3.289 23.5l4.684-4.684h-4.684V23.5zM0 22.105C0 23.152.848 24 1.895 24h3.289v-5.184H0v3.289z" fill="#4285F4"/></svg>'
  identity:
    endpoint: "https://www.googleapis.com/oauth2/v2/userinfo"
    field: email

auth:
  type: oauth2
  oauth:
    scopes:
      - "https://www.googleapis.com/auth/calendar.readonly"
      - "https://www.googleapis.com/auth/calendar.events"
      - "https://www.googleapis.com/auth/userinfo.email"
    endpoint: google
    vault_key: google
    scope_merge: true

api:
  base_url: "https://www.googleapis.com/calendar/v3"
  type: rest

actions:
  list_events:
    display_name: "List events"
    risk: { category: read, sensitivity: low, description: "List calendar events" }
    method: GET
    path: "/calendars/{{.calendar_id}}/events"
    params:
      calendar_id: { type: string, default: "primary", location: path }
      from:
        type: string
        default_expr: "now()"
        transform: "rfc3339(from)"
        map_to: timeMin
        location: query
      to:
        type: string
        transform: "endOfDay(to)"
        map_to: timeMax
        location: query
      max_results: { type: int, default: 10, max: 50, map_to: maxResults, location: query }
      single_events: { type: string, default: "true", map_to: singleEvents, location: query }
      order_by: { type: string, default: "startTime", map_to: orderBy, location: query }
    response:
      data_path: "items"
      fields:
        - { name: id }
        - { name: summary, sanitize: true }
        - name: start
          expr: "start.dateTime ?? start.date ?? ''"
        - name: end
          expr: "end.dateTime ?? end.date ?? ''"
        - { name: location, sanitize: true, optional: true }
        - { name: description, sanitize: true, optional: true }
        - name: attendees
          expr: "attendees"
          optional: true
        - { name: status }
      summary: "{{len .Data}} event(s)"

  get_event:
    display_name: "Get event"
    risk: { category: read, sensitivity: low, description: "Read a specific calendar event" }
    method: GET
    path: "/calendars/{{.calendar_id}}/events/{{.event_id}}"
    params:
      event_id: { type: string, required: true, location: path }
      calendar_id: { type: string, default: "primary", location: path }
    response:
      fields:
        - { name: id }
        - { name: summary, sanitize: true }
        - name: start
          expr: "start.dateTime ?? start.date ?? ''"
        - name: end
          expr: "end.dateTime ?? end.date ?? ''"
        - { name: location, sanitize: true }
        - { name: description, sanitize: true }
        - { name: attendees }
        - { name: status }
      summary: "Event: {{.summary}}"

  create_event:
    display_name: "Create event"
    risk: { category: write, sensitivity: medium, description: "Create a calendar event" }
    method: POST
    path: "/calendars/{{.calendar_id}}/events"
    params:
      calendar_id: { type: string, default: "primary", location: path }
      summary: { type: string, required: true, location: body }
      description: { type: string, location: body }
      start:
        type: string
        required: true
        location: body
        transform: "isAllDay(start) ? {date: start} : {dateTime: rfc3339(start)}"
      end:
        type: string
        required: true
        location: body
        transform: "isAllDay(end) ? {date: end} : {dateTime: rfc3339(end)}"
      attendees:
        type: array
        location: body
        transform: "emailList(attendees)"
    response:
      fields:
        - { name: id, rename: event_id }
        - { name: summary }
        - { name: htmlLink, rename: link }
      summary: "Created event: {{.summary}}"

  update_event:
    display_name: "Update event"
    risk: { category: write, sensitivity: medium, description: "Update a calendar event" }
    method: PATCH
    path: "/calendars/{{.calendar_id}}/events/{{.event_id}}"
    body_mode: sparse
    params:
      event_id: { type: string, required: true, location: path }
      calendar_id: { type: string, default: "primary", location: path }
      summary: { type: string, location: body }
      description: { type: string, location: body }
      start:
        type: string
        location: body
        transform: "isAllDay(start) ? {date: start} : {dateTime: rfc3339(start)}"
      end:
        type: string
        location: body
        transform: "isAllDay(end) ? {date: end} : {dateTime: rfc3339(end)}"
    response:
      fields:
        - { name: id, rename: event_id }
        - { name: summary }
      summary: "Updated event: {{.summary}}"

  delete_event:
    display_name: "Delete event"
    risk: { category: delete, sensitivity: high, description: "Delete a calendar event" }
    method: DELETE
    path: "/calendars/{{.calendar_id}}/events/{{.event_id}}"
    params:
      event_id: { type: string, required: true, location: path }
      calendar_id: { type: string, default: "primary", location: path }
    response:
      summary: "Deleted event {{.event_id}}"

  list_calendars:
    display_name: "List calendars"
    risk: { category: read, sensitivity: low, description: "List available calendars" }
    method: GET
    path: "/users/me/calendarList"
    response:
      data_path: "items"
      fields:
        - { name: id }
        - { name: summary }
        - { name: primary }
      summary: "{{len .Data}} calendar(s)"
