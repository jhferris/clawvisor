service:
  id: notion
  display_name: Notion
  description: "Read and search pages, query databases, and access your team's knowledge base in Notion."
  setup_url: "https://www.notion.so/profile/integrations"
  icon_svg: '<svg viewBox="0 0 24 24"><path fill="#000000" d="M4.459 4.208c.746.606 1.026.56 2.428.466l13.215-.793c.28 0 .047-.28-.046-.326L17.86 1.968c-.42-.326-.981-.7-2.055-.607L3.01 2.295c-.466.046-.56.28-.374.466zm.793 3.08v13.904c0 .747.373 1.027 1.214.98l14.523-.84c.841-.046.935-.56.935-1.167V6.354c0-.606-.233-.933-.748-.887l-15.177.887c-.56.047-.747.327-.747.933zm14.337.745c.093.42 0 .84-.42.888l-.7.14v10.264c-.608.327-1.168.514-1.635.514-.748 0-.935-.234-1.495-.933l-4.577-7.186v6.952L12.21 19s0 .84-1.168.84l-3.222.186c-.093-.186 0-.653.327-.746l.84-.233V9.854L7.822 9.76c-.094-.42.14-1.026.793-1.073l3.456-.233 4.764 7.279v-6.44l-1.215-.139c-.093-.514.28-.887.747-.933zM1.936 1.035l13.31-.98c1.634-.14 2.055-.047 3.082.7l4.249 2.986c.7.513.934.653.934 1.213v16.378c0 1.026-.373 1.634-1.68 1.726l-15.458.934c-.98.047-1.448-.093-1.962-.747l-3.129-4.06c-.56-.747-.793-1.306-.793-1.96V2.667c0-.839.374-1.54 1.447-1.632z"/></svg>'
  identity:
    endpoint: "/users/me"
    field: "bot.workspace_name"

auth:
  type: api_key
  header: "Authorization"
  header_prefix: "Bearer "
  extra_headers:
    Notion-Version: "2022-06-28"
    Content-Type: "application/json"

api:
  base_url: "https://api.notion.com/v1"
  type: rest

actions:
  search:
    display_name: "Search"
    risk: { category: search, sensitivity: low, description: "Search Notion pages and databases" }
    method: POST
    path: "/search"
    params:
      query: { type: string, location: body }
      filter: { type: object, location: body }
      page_size: { type: int, default: 20, max: 100, location: body }
    response:
      data_path: "results"
      fields:
        - { name: id }
        - { name: object }
        - { name: url }
      summary: "{{len .Data}} search result(s)"

  get_page:
    display_name: "Get page"
    risk: { category: read, sensitivity: low, description: "Read a Notion page" }
    method: GET
    path: "/pages/{{.page_id}}"
    params:
      page_id: { type: string, required: true, location: path }
    response:
      fields:
        - { name: id }
        - { name: url }
        - { name: created_time }
        - { name: archived }
        - { name: properties, transform: notion_flatten_properties }
      summary: "Page {{.id}}"

  create_page:
    display_name: "Create page"
    risk: { category: write, sensitivity: medium, description: "Create a Notion page" }
    method: POST
    path: "/pages"
    params:
      parent: { type: object, required: true, location: body }
      properties: { type: object, required: true, location: body }
      children: { type: array, location: body }
    response:
      fields:
        - { name: id }
        - { name: url }
      summary: "Created page {{.id}}"

  update_page:
    display_name: "Update page"
    risk: { category: write, sensitivity: medium, description: "Update a Notion page" }
    method: PATCH
    path: "/pages/{{.page_id}}"
    params:
      page_id: { type: string, required: true, location: path }
      properties: { type: object, required: true, location: body }
      archived: { type: bool, location: body }
    response:
      fields:
        - { name: id }
        - { name: url }
      summary: "Updated page {{.id}}"

  query_database:
    display_name: "Query database"
    risk: { category: read, sensitivity: low, description: "Query a Notion database" }
    method: POST
    path: "/databases/{{.database_id}}/query"
    params:
      database_id: { type: string, required: true, location: path }
      filter: { type: object, location: body }
      sorts: { type: array, location: body }
      page_size: { type: int, default: 50, max: 100, location: body }
    response:
      data_path: "results"
      fields:
        - { name: id }
        - { name: url }
        - { name: properties, transform: notion_flatten_properties }
      summary: "{{len .Data}} row(s)"

  list_databases:
    display_name: "List databases"
    risk: { category: read, sensitivity: low, description: "List Notion databases" }
    method: POST
    path: "/search"
    params:
      page_size: { type: int, default: 20, max: 100, location: body }
    response:
      data_path: "results"
      fields:
        - { name: id }
        - { name: url }
      summary: "{{len .Data}} database(s)"
