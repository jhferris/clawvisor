service:
  id: github
  display_name: GitHub
  description: "Create and manage issues, open pull requests, review code, and browse repositories on GitHub."
  setup_url: "https://github.com/settings/tokens"
  icon_svg: '<svg viewBox="0 0 24 24"><path fill="#181717" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>'
  identity:
    endpoint: "/user"
    field: "login"

auth:
  type: api_key
  header: "Authorization"
  header_prefix: "token "
  extra_headers:
    Accept: "application/vnd.github.v3+json"
  device_flow:
    client_id: "Ov23lilVGK2hqWMGk9Qk"
    client_id_env: "GITHUB_CLIENT_ID"
    scopes: ["repo", "read:org", "read:user"]
    device_code_url: "https://github.com/login/device/code"
    token_url: "https://github.com/login/oauth/access_token"

api:
  base_url: "https://api.github.com"
  type: rest

actions:
  list_issues:
    display_name: "List issues"
    risk: { category: read, sensitivity: low, description: "List GitHub issues" }
    method: GET
    path: "/repos/{{.owner}}/{{.repo}}/issues"
    params:
      owner: { type: string, required: true, location: path }
      repo: { type: string, required: true, location: path }
      state: { type: string, default: "open", location: query }
      max_results: { type: int, default: 30, max: 100, location: query }
      labels: { type: string, location: query }
      assignee: { type: string, location: query }
    response:
      fields:
        - { name: number }
        - { name: title, sanitize: true }
        - { name: state }
        - { name: created_at }
        - { name: html_url, rename: url }
      summary: "{{len .Data}} issue(s)"

  get_issue:
    display_name: "Get issue"
    risk: { category: read, sensitivity: low, description: "Read a specific GitHub issue" }
    method: GET
    path: "/repos/{{.owner}}/{{.repo}}/issues/{{.number}}"
    params:
      owner: { type: string, required: true, location: path }
      repo: { type: string, required: true, location: path }
      number: { type: int, required: true, location: path }
    response:
      fields:
        - { name: number }
        - { name: title, sanitize: true }
        - { name: body, sanitize: true }
        - { name: state }
        - { name: created_at }
        - { name: html_url, rename: url }
      summary: "Issue #{{.number}}: {{.title}} [{{.state}}]"

  create_issue:
    display_name: "Create issue"
    risk: { category: write, sensitivity: medium, description: "Create a GitHub issue" }
    method: POST
    path: "/repos/{{.owner}}/{{.repo}}/issues"
    params:
      owner: { type: string, required: true, location: path }
      repo: { type: string, required: true, location: path }
      title: { type: string, required: true, location: body }
      body: { type: string, location: body }
      labels: { type: array, location: body }
      assignees: { type: array, location: body }
    response:
      fields:
        - { name: number }
        - { name: title }
        - { name: html_url, rename: url }
      summary: "Created issue #{{.number}}: {{.title}}"

  comment_issue:
    display_name: "Comment on issue"
    risk: { category: write, sensitivity: medium, description: "Comment on a GitHub issue" }
    method: POST
    path: "/repos/{{.owner}}/{{.repo}}/issues/{{.number}}/comments"
    params:
      owner: { type: string, required: true, location: path }
      repo: { type: string, required: true, location: path }
      number: { type: int, required: true, location: path }
      body: { type: string, required: true, location: body }
    response:
      fields:
        - { name: id }
        - { name: html_url, rename: url }
      summary: "Added comment to issue #{{.number}}"

  list_prs:
    display_name: "List PRs"
    risk: { category: read, sensitivity: low, description: "List pull requests" }
    method: GET
    path: "/repos/{{.owner}}/{{.repo}}/pulls"
    params:
      owner: { type: string, required: true, location: path }
      repo: { type: string, required: true, location: path }
      state: { type: string, default: "open", location: query }
      max_results: { type: int, default: 30, max: 100, location: query }
    response:
      fields:
        - { name: number }
        - { name: title, sanitize: true }
        - { name: state }
        - { name: created_at }
        - { name: html_url, rename: url }
      summary: "{{len .Data}} PR(s)"

  get_pr:
    display_name: "Get PR"
    risk: { category: read, sensitivity: low, description: "Read a specific pull request" }
    method: GET
    path: "/repos/{{.owner}}/{{.repo}}/pulls/{{.number}}"
    params:
      owner: { type: string, required: true, location: path }
      repo: { type: string, required: true, location: path }
      number: { type: int, required: true, location: path }
    response:
      fields:
        - { name: number }
        - { name: title, sanitize: true }
        - { name: body, sanitize: true }
        - { name: state }
        - { name: merged }
        - { name: created_at }
        - { name: html_url, rename: url }
      summary: "PR #{{.number}}: {{.title}} [{{.state}}]"

  list_repos:
    display_name: "List repos"
    risk: { category: read, sensitivity: low, description: "List repositories" }
    method: GET
    path: "/user/repos"
    params:
      max_results: { type: int, default: 30, max: 100, location: query }
    response:
      fields:
        - { name: name }
        - { name: full_name }
        - { name: description, sanitize: true }
        - { name: private }
        - { name: language }
        - { name: stargazers_count, rename: stars }
        - { name: html_url, rename: url }
      summary: "{{len .Data}} repository(ies)"

  search_code:
    display_name: "Search code"
    risk: { category: search, sensitivity: low, description: "Search code across repositories" }
    method: GET
    path: "/search/code"
    params:
      query: { type: string, required: true, location: query, map_to: "q" }
    response:
      data_path: "items"
      fields:
        - { name: name, rename: file }
        - { name: path }
        - { name: html_url, rename: url }
      summary: "{{len .Data}} code result(s)"
