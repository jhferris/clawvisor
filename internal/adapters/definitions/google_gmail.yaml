service:
  id: google.gmail
  display_name: Gmail
  description: "Read, search, send, and draft emails. Manage labels, handle attachments, and organize your inbox."
  setup_url: "https://github.com/clawvisor/clawvisor/blob/main/docs/GOOGLE_OAUTH_SETUP.md"
  icon_svg: '<svg viewBox="0 0 24 24" fill="none"><path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.91 1.528-1.145C21.69 2.28 24 3.434 24 5.457z" fill="#EA4335"/></svg>'
  identity:
    endpoint: "https://www.googleapis.com/oauth2/v2/userinfo"
    field: email

auth:
  type: oauth2
  oauth:
    scopes:
      - "https://www.googleapis.com/auth/gmail.readonly"
      - "https://www.googleapis.com/auth/gmail.send"
      - "https://www.googleapis.com/auth/userinfo.email"
      - "https://www.googleapis.com/auth/userinfo.profile"
    conditional_scopes:
      - scope: "https://www.googleapis.com/auth/gmail.compose"
        env_gate: "GMAIL_DRAFTS_ENABLED"
        default: true
    endpoint: google
    vault_key: google
    scope_merge: true

api:
  base_url: "https://gmail.googleapis.com/gmail/v1"
  type: rest

actions:
  list_messages:
    display_name: "List messages"
    risk: { category: read, sensitivity: low, description: "List email messages" }
    scopes: ["https://www.googleapis.com/auth/gmail.readonly"]
    override: go
    params:
      query: { type: string }
      max_results: { type: int, default: 10, max: 200 }
      page_token: { type: string }

  get_message:
    display_name: "Get message"
    risk: { category: read, sensitivity: low, description: "Read a specific email message" }
    scopes: ["https://www.googleapis.com/auth/gmail.readonly"]
    override: go
    params:
      message_id: { type: string, required: true }

  get_thread:
    display_name: "Get thread"
    risk: { category: read, sensitivity: low, description: "Read all messages in an email thread" }
    scopes: ["https://www.googleapis.com/auth/gmail.readonly"]
    override: go
    params:
      thread_id: { type: string, required: true }

  get_attachment:
    display_name: "Get attachment"
    risk: { category: read, sensitivity: low, description: "Download an email attachment" }
    scopes: ["https://www.googleapis.com/auth/gmail.readonly"]
    override: go
    params:
      message_id: { type: string, required: true }
      attachment_id: { type: string, required: true }

  send_message:
    display_name: "Send message"
    risk: { category: write, sensitivity: high, description: "Send email as the user" }
    scopes: ["https://www.googleapis.com/auth/gmail.send"]
    override: go
    params:
      to: { type: string }
      subject: { type: string }
      body: { type: string }
      thread_id: { type: string, description: "Gmail thread ID for replying in-thread (preferred — auto-populates to/subject, quotes previous message)" }
      in_reply_to: { type: string, description: "RFC 2822 Message-ID to reply to (alternative to thread_id — will resolve the thread automatically)" }

  create_draft:
    display_name: "Create draft"
    risk: { category: write, sensitivity: low, description: "Create an email draft (not sent)" }
    scopes: ["https://www.googleapis.com/auth/gmail.compose"]
    override: go
    params:
      to: { type: string, required: true }
      subject: { type: string, required: true }
      body: { type: string }
      in_reply_to: { type: string }
