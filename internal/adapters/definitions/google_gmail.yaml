service:
  id: google.gmail
  display_name: Gmail
  description: "Read, search, send, and draft email with attachment support"
  setup_url: "https://github.com/clawvisor/clawvisor/blob/main/docs/GOOGLE_OAUTH_SETUP.md"

auth:
  type: oauth2
  oauth:
    scopes:
      - "https://www.googleapis.com/auth/gmail.readonly"
      - "https://www.googleapis.com/auth/gmail.send"
    conditional_scopes:
      - scope: "https://www.googleapis.com/auth/gmail.compose"
        env_gate: "GMAIL_DRAFTS_ENABLED"
        default: true
    endpoint: google
    vault_key: google
    scope_merge: true

api:
  base_url: "https://gmail.googleapis.com/gmail/v1"
  type: rest

actions:
  list_messages:
    display_name: "List messages"
    risk: { category: read, sensitivity: low, description: "List email messages" }
    override: go
    params:
      query: { type: string }
      max_results: { type: int, default: 10, max: 50 }

  get_message:
    display_name: "Get message"
    risk: { category: read, sensitivity: low, description: "Read a specific email message" }
    override: go
    params:
      message_id: { type: string, required: true }

  get_attachment:
    display_name: "Get attachment"
    risk: { category: read, sensitivity: low, description: "Download an email attachment" }
    override: go
    params:
      message_id: { type: string, required: true }
      attachment_id: { type: string, required: true }

  send_message:
    display_name: "Send message"
    risk: { category: write, sensitivity: high, description: "Send email as the user" }
    override: go
    params:
      to: { type: string, required: true }
      subject: { type: string, required: true }
      body: { type: string }
      in_reply_to: { type: string }

  create_draft:
    display_name: "Create draft"
    risk: { category: write, sensitivity: low, description: "Create an email draft (not sent)" }
    override: go
    params:
      to: { type: string, required: true }
      subject: { type: string, required: true }
      body: { type: string }
      in_reply_to: { type: string }
