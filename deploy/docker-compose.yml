version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clawvisor
      POSTGRES_PASSWORD: clawvisor
      POSTGRES_DB: clawvisor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawvisor"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    container_name: clawvisor
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "25297:25297"
    environment:
      DATABASE_URL: "postgres://clawvisor:clawvisor@postgres:5432/clawvisor"
      DATABASE_DRIVER: "postgres"
      JWT_SECRET: "dev-secret-change-in-production"
      SERVER_HOST: "0.0.0.0"
      VAULT_BACKEND: "local"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      CLAWVISOR_LLM_VERIFICATION_ENABLED: "${CLAWVISOR_LLM_VERIFICATION_ENABLED:-false}"
      CLAWVISOR_LLM_VERIFICATION_PROVIDER: "${CLAWVISOR_LLM_VERIFICATION_PROVIDER:-}"
      CLAWVISOR_LLM_VERIFICATION_ENDPOINT: "${CLAWVISOR_LLM_VERIFICATION_ENDPOINT:-}"
      CLAWVISOR_LLM_VERIFICATION_MODEL: "${CLAWVISOR_LLM_VERIFICATION_MODEL:-}"
      CLAWVISOR_LLM_VERIFICATION_API_KEY: "${CLAWVISOR_LLM_VERIFICATION_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - vault_key:/vault

volumes:
  postgres_data:
  vault_key:
