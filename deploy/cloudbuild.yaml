steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/clawvisor:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/clawvisor:latest"
      - "-f"
      - "deploy/Dockerfile"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/clawvisor:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/clawvisor:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "clawvisor"
      - "--image=gcr.io/$PROJECT_ID/clawvisor:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"

images:
  - "gcr.io/$PROJECT_ID/clawvisor:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/clawvisor:latest"
